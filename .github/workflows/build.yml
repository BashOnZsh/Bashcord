name: Release
on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
    FORCE_COLOR: true
    REPO: BashOnZsh/Bashcord

permissions:
    contents: write

concurrency:
  group: release-latest
  cancel-in-progress: false

jobs:
    Build:
        name: Build Bashcord
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              run: pnpm buildWebStandalone

            - name: Build
              run: pnpm buildStandalone

            - name: Generate plugin lists
              run: |
                  pnpm generatePluginJson dist/plugins.json
                  pnpm generateEquicordPluginJson dist/equicordplugins.json
                  pnpm generateVencordPluginJson dist/vencordplugins.json
                  pnpm generateDevsList dist/devs.json

            - name: Collect files to be released
              run: |
                  cd dist
                  mkdir release

                  cp browser/browser.* release
                  cp Bashcord.user.{js,js.LEGAL.txt} release

                  # copy the plugin data jsons, the extension zips and the desktop/vesktop asars
                  cp *.{json,zip,asar} release

                  # legacy un-asared files
                  cp desktop/* release
                  if [ -d bashbop ]; then
                    for file in bashbop/*; do
                      [ -e "$file" ] || continue
                      filename=$(basename "$file")
                      cp "$file" "release/bashbop${filename^}"
                    done
                  elif [ -d equibop ]; then
                    for file in equibop/*; do
                      [ -e "$file" ] || continue
                      filename=$(basename "$file")
                      cp "$file" "release/bashbop${filename^}"
                    done
                  fi

                  # rename any remaining equibop artifacts to bashbop
                  for file in release/*; do
                    filename=$(basename "$file")
                    newname="${filename//equibop/bashbop}"
                    newname="${newname//Equibop/Bashbop}"
                    if [ "$filename" != "$newname" ]; then
                      mv "$file" "release/$newname"
                    fi
                  done

                  find release -size 0 -delete
                  rm release/package.json
                  rm release/*.map

            - name: Upload Bashcord Stable
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  SHORT_SHA="${GITHUB_SHA::7}"
                  RELEASE_TITLE="Latest ${SHORT_SHA}"
                  RELEASE_NOTES="Rolling release\n\nCommit: ${GITHUB_SHA}"

                  if gh release view latest >/dev/null 2>&1; then
                    gh release edit latest --target "$GITHUB_SHA" --title "$RELEASE_TITLE" --notes "$RELEASE_NOTES"
                  else
                    gh release create latest --target "$GITHUB_SHA" --title "$RELEASE_TITLE" --notes "$RELEASE_NOTES"
                  fi
                  gh release upload latest --clobber dist/release/*

            - name: Upload Plugin JSONs to Bashcord repo
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  git config --global user.name "GitHub-Actions"
                  git config --global user.email actions@github.com
                  git clone https://x-access-token:$GH_TOKEN@github.com/$REPO.git plugins
                  cd plugins

                  cp ../dist/release/*.json .
                  git add -A

                  git diff --cached --quiet || git commit -m "Plugins for https://github.com/$GITHUB_REPOSITORY/commit/$GITHUB_SHA"
                  git push --force https://x-access-token:$GH_TOKEN@github.com/$REPO.git
