name: Sync Upstream Equicord

on:
    workflow_dispatch:
    schedule:
        - cron: "0 6 * * *" # tous les jours à 6h UTC

permissions:
    contents: write

jobs:
    sync:
        name: Rebase on upstream/main
        runs-on: ubuntu-latest

        steps:
            - name: Checkout fork
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.SYNC_PAT }}

            - name: Configure git user
              run: |
                  git config --global user.name "GitHub-Actions"
                  git config --global user.email "actions@github.com"

            - name: Add upstream remote
              run: git remote add upstream https://github.com/Equicord/Equicord.git

            - name: Fetch upstream
              run: git fetch upstream

            - name: Save protected files
              run: |
                  # Ajoute ici les fichiers/dossiers à protéger
                  PROTECTED=(
                    ".github/workflows"
                    "package.json"
                    "pnpm-lock.yaml"
                    "tsconfig.json"
                    "src/userplugins"
                    "src/equicordplugins/followVoiceUser"
                    "src/equicordplugins/equicordToolbox"
                    "src/equicordplugins/instantScreenshare"
                    "src/plugins/_core/settings.tsx"
                    "src/main/updater"
                    "src/utils/updater.ts"
                    "src/components/settings/tabs/updater"
                    "src/components/settings/tabs/plugins"
                    "src/components/settings/tabs/vencord"
                    "src/components/settings/tabs/changelog"
                    "README.md"
                    "browser/icon.png"
                    "plugins.json"
                    "vencordplugins.json"
                    "equicordplugins.json"
                    "devs.json"
                  )

                  # Reuse the same protected scope across save/rebase/restore.
                  printf '%s\n' "${PROTECTED[@]}" > /tmp/protected-paths.txt
                  : > /tmp/protected-state.txt

                  mkdir -p /tmp/protected
                  for path in "${PROTECTED[@]}"; do
                    if [ -e "$path" ]; then
                      echo "1:$path" >> /tmp/protected-state.txt
                      mkdir -p "/tmp/protected/$(dirname "$path")"
                      cp -r "$path" "/tmp/protected/$path"
                    else
                      echo "0:$path" >> /tmp/protected-state.txt
                    fi
                  done

            - name: Rebase on upstream/main
              run: |
                  set -euo pipefail
                  git checkout main

                  mapfile -t PROTECTED < /tmp/protected-paths.txt

                  is_protected_file() {
                    local file="$1"
                    local path
                    for path in "${PROTECTED[@]}"; do
                      if [[ "$file" == "$path" || "$file" == "$path"/* ]]; then
                        return 0
                      fi
                    done
                    return 1
                  }

                  rebase_status=0
                  GIT_EDITOR=true git rebase upstream/main || rebase_status=$?

                  while [ "$rebase_status" -ne 0 ]; do
                    conflicted_files="$(git diff --name-only --diff-filter=U || true)"

                    if [ -z "$conflicted_files" ]; then
                      echo "Rebase failed without merge conflicts."
                      exit "$rebase_status"
                    fi

                    unresolved=0
                    while IFS= read -r file; do
                      [ -z "$file" ] && continue
                      if is_protected_file "$file"; then
                        echo "Auto-resolving protected conflict with ours: $file"
                        git checkout --ours -- "$file"
                        git add "$file"
                      else
                        echo "Conflict on non-protected file: $file"
                        unresolved=1
                      fi
                    done <<< "$conflicted_files"

                    if [ "$unresolved" -ne 0 ]; then
                      echo "Found conflicts outside protected scope; manual resolution required."
                      git status --short
                      exit 1
                    fi

                    rebase_status=0
                    GIT_EDITOR=true git rebase --continue || rebase_status=$?
                  done

            - name: Restore protected files
              run: |
                  while IFS= read -r entry; do
                    [ -z "$entry" ] && continue
                    exists="${entry%%:*}"
                    path="${entry#*:}"

                    if [ "$exists" = "1" ] && [ -e "/tmp/protected/$path" ]; then
                      rm -rf "$path"
                      mkdir -p "$(dirname "$path")"
                      cp -r "/tmp/protected/$path" "$path"
                    else
                      rm -rf "$path"
                    fi
                  done < /tmp/protected-state.txt

                  git add -A
                  git diff --cached --quiet || git commit -m "chore: restore protected files after upstream sync"

            - name: Push rebased branch
              run: git push --force https://x-access-token:${{ secrets.SYNC_PAT }}@github.com/${{ github.repository }}.git main
